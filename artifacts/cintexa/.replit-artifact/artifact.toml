kind = "web"
previewPath = "/"
title = "CINTEXA CMS"
version = "1.0.0"
id = "artifacts/cintexa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22065

[services.development]
run = "pnpm --filter @workspace/cintexa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cintexa", "run", "build" ]
publicDir = "artifacts/cintexa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22065"
BASE_PATH = "/"
